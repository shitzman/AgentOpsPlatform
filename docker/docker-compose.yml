# AgentOps Platform — Docker Compose 开发环境
#
# 启动全部服务:
#   docker compose -f docker/docker-compose.yml up -d
#
# 停止并清理:
#   docker compose -f docker/docker-compose.yml down -v
#
# 单独启动某个服务:
#   docker compose -f docker/docker-compose.yml up -d mysql
#
# 服务端口一览:
#   MySQL:       3306
#   Redis:       6379
#   Prometheus:  9090
#   Grafana:     3000  (admin/admin)
#   OTel gRPC:   4317
#   OTel HTTP:   4318

services:
  # ==========================================================================
  # MySQL 8.0 — 持久化存储
  # ==========================================================================
  mysql:
    image: mysql:8.0
    container_name: agentops-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agentops}
      MYSQL_USER: ${MYSQL_USER:-agentops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-agentops123}
    volumes:
      - mysqldata:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

  # ==========================================================================
  # Redis 7 — 缓存与会话状态
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: agentops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Prometheus — 指标收集与查询
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: agentops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Grafana — 可观测性仪表板
  # ==========================================================================
  grafana:
    image: grafana/grafana:11.3.0
    container_name: agentops-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy

  # ==========================================================================
  # OpenTelemetry Collector — 链路追踪与指标采集
  # ==========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: agentops-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC 接收端
      - "4318:4318"   # OTLP HTTP 接收端
      - "8888:8888"   # Collector 自身指标（供 Prometheus 抓取）
      - "8889:8889"   # Prometheus Exporter 端点
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  mysqldata:
    name: agentops_mysqldata
  redisdata:
    name: agentops_redisdata
  prometheusdata:
    name: agentops_prometheusdata
  grafanadata:
    name: agentops_grafanadata
