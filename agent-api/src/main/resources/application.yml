# AgentOps Platform — 应用配置（纳入版本控制）
#
# 本地开发敏感配置请放到 application-local.yml（已加入 .gitignore）

# 激活 local profile: mvn spring-boot:run -pl agent-api -Dspring-boot.run.profiles=local
server:
  port: 8088

spring:
  application:
    name: agentops-platform
  profiles:
    active: local
  # 默认数据源（H2 内存数据库，开发 profile 使用）
  datasource:
    url: jdbc:h2:mem:agentops;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

# Spring Boot Actuator + Micrometer Tracing + OpenTelemetry
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0  # 开发环境全量采样
  otlp:
    tracing:
      endpoint: ${AGENTOPS_OTEL_ENDPOINT:http://localhost:4318/v1/traces}
      transport: http

# AgentOps LLM 配置（支持 OpenAI / DeepSeek / 通义千问等兼容 API）
agentops:
  llm:
    # API 地址（默认使用 DeepSeek，国内可直接访问）
    base-url: ${AGENTOPS_LLM_BASE_URL:https://api.deepseek.com}
    # API 密钥（必须通过环境变量设置）
    api-key: ${AGENTOPS_LLM_API_KEY:}
    # 默认模型
    model: ${AGENTOPS_LLM_MODEL:deepseek-v4-flash}
