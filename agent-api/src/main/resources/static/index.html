<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentOps Platform — 控制台</title>
<link rel="stylesheet" href="css/app.css?v=1.1.0">
</head>
<body>

<!-- ================================================================ -->
<!-- Header -->
<!-- ================================================================ -->
<header class="header">
  <div class="header-left">
    <h1 class="logo">🛡️ AgentOps</h1>
    <span class="version" id="headerVersion">v1.0.0</span>
  </div>
  <div class="header-right">
    <span class="health-dot" id="healthDot" title="检查中..."></span>
    <span class="health-text" id="healthText">检查中...</span>
    <span class="health-info" id="healthInfo"></span>
  </div>
</header>

<!-- ================================================================ -->
<!-- Tab Bar -->
<!-- ================================================================ -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="diagnosis">🔍 诊断测试</button>
  <button class="tab-btn" data-tab="projects">📁 项目配置</button>
  <button class="tab-btn" data-tab="logsources">📋 日志源</button>
  <button class="tab-btn" data-tab="history">📊 诊断历史</button>
</nav>

<!-- ================================================================ -->
<!-- Notification Area -->
<!-- ================================================================ -->
<div class="notification" id="notification" style="display:none"></div>

<!-- ================================================================ -->
<!-- Modal Overlay -->
<!-- ================================================================ -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- ================================================================ -->
<!-- Tab Panels -->
<!-- ================================================================ -->
<main class="content">
  <section class="tab-panel active" id="panel-diagnosis"></section>
  <section class="tab-panel" id="panel-projects"></section>
  <section class="tab-panel" id="panel-logsources"></section>
  <section class="tab-panel" id="panel-history"></section>
</main>

<!-- ================================================================ -->
<!-- Scripts (dependency order: utils → api → app → components) -->
<!-- ================================================================ -->
<script src="js/utils.js?v=1.1.0"></script>
<script src="js/api.js?v=1.1.0"></script>
<script src="js/app.js?v=1.1.0"></script>
<script src="js/components/diagnosis.js?v=1.1.0"></script>
<script src="js/components/projects.js?v=1.1.0"></script>
<script src="js/components/logsources.js?v=1.1.0"></script>
<script src="js/components/history.js?v=1.1.0"></script>
<script>
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
